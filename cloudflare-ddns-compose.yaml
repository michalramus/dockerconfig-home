version: '3.9'
services:
  cloudflare-ddns:
    image: timothyjmiller/cloudflare-ddns@sha256:01bf36f522def6254a64b4b5e3c0c3696d0b20f02cbe429037d160f5100127cb
    container_name: cloudflare-ddns
    security_opt:
      - no-new-privileges:true
    network_mode: 'host'
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - /docker/cloudflare-ddns/config.json:/config.json
    restart: unless-stopped
